version: 2

project_name: spot

before:
  hooks:
    - go mod tidy

builds:
  - id: spot
    main: ./cmd/spot
    binary: spot
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/spot-nyc/spot.Version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: spot
    repository:
      owner: spot-nyc
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/spot-nyc/spot"
    description: "Spot — CLI for restaurant reservation searches and bookings."
    license: "MIT"
    test: |
      system "#{bin}/spot --version"
    install: |
      bin.install "spot"

scoops:
  - name: spot
    repository:
      owner: spot-nyc
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/spot-nyc/spot"
    description: "Spot — CLI for restaurant reservation searches and bookings."
    license: "MIT"
    commit_msg_template: "scoop: update spot to {{ .Tag }}"
