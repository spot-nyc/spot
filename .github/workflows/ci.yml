name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Opt into Node 24 for JS-based actions; Node 20 is deprecated and will be
  # removed from runners on 2026-09-16. Remove once the runner defaults flip
  # on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Verify modules
        run: go mod verify
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./... -race -coverprofile=coverage.out

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean
